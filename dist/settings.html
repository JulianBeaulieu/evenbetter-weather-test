<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    padding: 24px 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 24px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  input, select {
    width: 100%;
    padding: 12px;
    border: 1px solid #333;
    border-radius: 10px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 16px;
    margin-bottom: 20px;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: #5c6bc0;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #5c6bc0;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
  }
  button:active { opacity: 0.8; }
  .saved {
    text-align: center;
    color: #66bb6a;
    font-size: 14px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved.show { opacity: 1; }
  .current {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #aaa;
  }
  .current strong { color: #e0e0e0; }
</style>
</head>
<body>

<h1>Weather Settings</h1>

<div class="current" id="current">
  Loading current settings...
</div>

<label for="city">City Name</label>
<input type="text" id="city" placeholder="e.g. New York">

<label for="lat">Latitude</label>
<input type="number" id="lat" step="any" placeholder="e.g. 40.7128">

<label for="lon">Longitude</label>
<input type="number" id="lon" step="any" placeholder="e.g. -74.0060">

<label for="unit">Temperature Unit</label>
<select id="unit">
  <option value="celsius">Celsius</option>
  <option value="fahrenheit">Fahrenheit</option>
</select>

<button onclick="save()">Save Settings</button>

<div class="saved" id="saved">Settings saved!</div>

<script>
  function load() {
    var city = localStorage.getItem('city') || 'New York';
    var lat = localStorage.getItem('latitude') || '40.7128';
    var lon = localStorage.getItem('longitude') || '-74.0060';
    var unit = localStorage.getItem('unit') || 'celsius';

    document.getElementById('city').value = city;
    document.getElementById('lat').value = lat;
    document.getElementById('lon').value = lon;
    document.getElementById('unit').value = unit;

    document.getElementById('current').innerHTML =
      'Current: <strong>' + city + '</strong> (' + lat + ', ' + lon + ') &middot; ' + unit;
  }

  function save() {
    var city = document.getElementById('city').value.trim();
    var lat = document.getElementById('lat').value.trim();
    var lon = document.getElementById('lon').value.trim();
    var unit = document.getElementById('unit').value;

    if (!city || !lat || !lon) return;

    localStorage.setItem('city', city);
    localStorage.setItem('latitude', lat);
    localStorage.setItem('longitude', lon);
    localStorage.setItem('unit', unit);

    document.getElementById('current').innerHTML =
      'Current: <strong>' + city + '</strong> (' + lat + ', ' + lon + ') &middot; ' + unit;

    var el = document.getElementById('saved');
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2000);
  }

  load();
</script>

</body>
</html>
